map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name quantlabs.site www.quantlabs.site;

    client_max_body_size 100M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    error_page 401 = @error401;
    location @error401 { return 302 /login; }

    location = / { root /usr/share/nginx/html; index index.html; }
    location = /index.html { root /usr/share/nginx/html; }
    location ~* ^/(css|js|img|images|fonts|icons|media|static)/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /assets/ { root /usr/share/nginx/html; }

    location /login {
        proxy_pass http://auth:7000/login;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Content-Type      $content_type;
        proxy_set_header Connection        "";
        proxy_pass_header Set-Cookie;
    }

    location ~ ^/activate/ {
        proxy_pass http://auth:7000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /admin/users {
        auth_request /auth/verify;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_pass http://auth:7000/admin/users;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location = /admin/gpu {
        auth_request /auth/admin-verify;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_pass http://unix:/run/quantlab/gpu-control.sock:/admin/gpu;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Content-Type $content_type;
    }

    location = /forgot-password {
        proxy_pass http://auth:7000/forgot-password;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/reset-password/ {
        proxy_pass http://auth:7000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /logout {
        proxy_pass http://auth:7000/logout;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header Cookie            $http_cookie;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_pass_header Set-Cookie;
    }

    location = /auth/verify {
        internal;
        proxy_pass http://auth:7000/auth/verify;
        proxy_http_version 1.1;
        proxy_pass_request_body off;
        proxy_set_header Content-Length    "";
        proxy_set_header Cookie            $http_cookie;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /auth/admin-verify {
        internal;
        proxy_pass http://auth:7000/admin/users;
        proxy_http_version 1.1;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /auth/ {
        auth_request /auth/verify;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_pass http://auth:7000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host      $host;
        proxy_set_header Cookie    $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_header Set-Cookie;
    }

    # ── WEBSOCKET (autenticado) ──────────────────────────
    location /ws/ {
        auth_request /auth/verify;
        proxy_pass http://websocket:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade         $http_upgrade;
        proxy_set_header Connection      $connection_upgrade;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location /dashboard/system/ {
        auth_request /auth/admin-verify;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /dashboard/system/index.html;
    }

    location /dashboard/ {
        auth_request /auth/verify;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location = /jupyter { return 301 /jupyter/lab; }
    location /jupyter/ {
        auth_request /auth/verify;
        proxy_pass http://jupyter_lite:8888/jupyter/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Cookie          $http_cookie;
        proxy_set_header Upgrade         $http_upgrade;
        proxy_set_header Connection      $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location = /jupyter-gpu { return 301 /jupyter-gpu/lab; }
    location /jupyter-gpu/ {
        auth_request /auth/verify;
        proxy_pass http://jupyter_gpu:8888/jupyter-gpu/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Cookie          $http_cookie;
        proxy_set_header Upgrade         $http_upgrade;
        proxy_set_header Connection      $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location /llm/ {
        auth_request /auth/verify;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /llm/index.html;
    }

    location /llm-api/ {
        auth_request /auth/verify;
        rewrite ^/llm-api/(.*)$ /$1 break;
        proxy_pass http://llm:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Cookie            $http_cookie;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300;
    }

    location = /bitaxe/info {
        auth_request /auth/verify;
        proxy_pass http://192.168.88.181/api/system/info;
        proxy_http_version 1.1;
        proxy_set_header Host          192.168.88.181;
        proxy_set_header Connection    "";
        proxy_set_header Cookie        "";
        proxy_set_header Authorization "";
        proxy_cache_bypass 1;
        proxy_no_cache     1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_connect_timeout 5s;
        proxy_read_timeout    8s;
        proxy_send_timeout    5s;
    }

    location /harness-api/ {
        auth_request /auth/verify;
        rewrite ^/harness-api/(.*)$ /$1 break;
        proxy_pass http://harness:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Cookie            $http_cookie;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /harness-api;
        proxy_set_header X-Script-Name     /harness-api;
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location /api/ {
        set $flask_upstream flask:5000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$flask_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Cookie            $http_cookie;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_set_header X-Script-Name     /api;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location /btc/ {
        auth_request /auth/verify;
        proxy_pass http://172.17.0.1:8332/;
        proxy_http_version 1.1;
        proxy_set_header Host      $host;
        proxy_set_header Cookie    $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # OPENCLAW → OLLAMA (sin prefijo /v1)
    location /ollama/ {
        auth_request /auth/verify;
        proxy_pass http://ollama:11434/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location /ollama/models {
        auth_request /auth/verify;
        proxy_pass http://ollama:11434/v1/models;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
}
