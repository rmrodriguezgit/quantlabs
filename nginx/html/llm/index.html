<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>QuantLabs AI - LLM Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/dashboard/css/style.css?v=20260528-command-center-1"/>
  <link rel="stylesheet" href="/dashboard/css/theme.css?v=20260531-theme-1"/>
  <link rel="stylesheet" href="./css/llm.css?v=20260531-llm-nav-1"/>
</head>
<body class="llm-page">
<div class="layout">
  <aside></aside>
  <main class="llm-shell">
    <section class="llm-control-panel fade">
      <div class="llm-title-block">
        <p class="eyebrow">LLM LOCAL</p>
        <h1>Chat privado</h1>
        <span id="llmStatus">Conectando</span>
      </div>
      <label class="control-field">
        <span>Backend</span>
        <select id="backendSelect">
          <option value="llama.cpp">llama.cpp</option>
          <option value="Ollama">Ollama</option>
        </select>
      </label>
      <label class="control-field model-field">
        <span>Modelo</span>
        <select id="modelSelect"></select>
      </label>
      <label class="control-field">
        <span>Especialista</span>
        <select id="specialistSelect">
          <option value="general">General</option>
          <option value="programador">Programador</option>
          <option value="abogado">Abogado</option>
          <option value="medico">Médico</option>
          <option value="universidad">Universidad</option>
          <option value="trading">Trading</option>
          <option value="polymarket">Polymarket</option>
          <option value="contador">Contador</option>
          <option value="secretaria">Secretaria</option>
        </select>
      </label>
      <button id="openServerModal" class="server-open" type="button">Servidor</button>
    </section>
    <section class="llm-chat fade">
      <div class="chat-head">
        <div>
          <p>MODELO EN USO</p>
          <h2 id="modelName">--</h2>
        </div>
        <div><span id="requestState">LISTO</span><span id="tokenUsage">--</span></div>
      </div>
      <div id="chatWindow" class="chat-window">
        <div class="chat-message assistant"><div class="message-tools"><button class="copy-response" type="button">Copiar respuesta</button></div><pre id="responseBox">Listo para consultar.</pre><small id="responseTime">Tiempo: --</small></div>
      </div>
      <form id="promptForm" class="chat-composer">
        <textarea id="prompt" rows="4" placeholder="Escribe tu consulta para el modelo local..."></textarea>
        <div class="composer-bar">
          <label>Tokens <input id="maxTokens" type="number" min="16" max="4096" step="16" value="384"></label>
          <label>Temp
            <select id="temperature">
              <option value="0.2">0.2</option>
              <option value="0.3">0.3</option>
              <option value="0.4">0.4</option>
              <option value="0.5">0.5</option>
              <option value="0.7">0.7</option>
              <option value="1">1.0</option>
            </select>
          </label>
          <button id="loadModelBtn" class="secondary-action" type="button">Cargar modelo</button>
          <button id="retryBtn" class="ghost-action" type="button">Reintentar</button>
          <button id="copyPromptBtn" class="ghost-action" type="button">Copiar</button>
          <button id="editPromptBtn" class="ghost-action" type="button">Editar</button>
          <button id="stopBtn" class="danger-action" type="button" disabled>Stop</button>
          <button id="runBtn" type="submit">Enviar</button>
        </div>
      </form>
    </section>
  </main>
</div>
<div class="server-modal" id="serverModal" aria-hidden="true">
  <div class="server-modal-backdrop" data-close-server></div>
  <section class="server-dialog" role="dialog" aria-modal="true" aria-labelledby="serverTitle">
    <header class="server-dialog-head">
      <div><p>SERVIDOR</p><h2 id="serverTitle">Estado del LLM</h2></div>
      <button id="closeServerModal" type="button" aria-label="Cerrar">x</button>
    </header>
    <div class="server-dialog-body">
      <div class="panel-head"><div><p>GPU</p><h2>Control</h2></div><span id="serverBadge">SYNC</span></div>
      <div id="gpuControl" class="gpu-control-box"></div>
      <div id="serverInfo" class="server-info"></div>
    </div>
  </section>
</div>
<script src="/dashboard/js/theme.js?v=20260531-theme-1"></script>
<script src="/dashboard/js/platform-menu.js?v=20260531-theme-1"></script>
<script src="./js/llm.js?v=20260531-llm-nav-1"></script>
</body>
</html>
