<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESCOLA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=20260531-logo">
  <link rel="stylesheet" href="./css/escola.css?v=20260609-1">
</head>
<body class="escola-page">
<header>
  <a href="/dashboard/" class="logo"><img class="logo-icon" src="/assets/quantlabs-logo.svg" alt="QuantLabs"><span class="logo-name">QuantLabs AI</span><span class="logo-badge">ESCOLA</span></a>
  <div class="header-right">
    <div class="session-pill"><div class="session-dot"></div><span id="topStatus">ESCOLA listo</span></div>
    <a href="/dashboard/harness/" class="session-pill">Harness</a>
    <a href="/logout" class="btn-logout">Cerrar sesion</a>
  </div>
</header>
<div class="layout">
  <aside></aside>
  <main class="escola-shell">
    <section class="escola-command fade">
      <div>
        <p class="eyebrow">ESCOLA RAG</p>
        <h1>Base documental del programa</h1>
      </div>
      <div class="escola-metrics">
        <div class="metric"><span>Documentos</span><strong id="docsMetric">--</strong></div>
        <div class="metric"><span>Chunks</span><strong id="chunksMetric">--</strong></div>
        <div class="metric"><span>Modo</span><strong id="modeMetric">RAG</strong></div>
      </div>
    </section>

    <section class="escola-grid fade">
      <article class="panel ingest-panel">
        <div class="panel-head"><div><p>ADMIN</p><h2>Ingesta</h2></div><span id="ingestState">IDLE</span></div>
        <div class="panel-body">
          <label class="drop-zone" for="escolaFile">
            <input id="escolaFile" type="file" accept=".pdf,.docx,.png,.jpg,.jpeg,.csv,.xls,.xlsx,.txt,.md,.json,.ipynb">
            <span id="fileName">Seleccionar archivo</span>
            <small id="fileMeta">PDF, Excel, CSV, texto, imagen o notebook</small>
          </label>
          <label class="field"><small>Tags</small><input id="tagsInput" type="text" placeholder="programa, reglamento, becas"></label>
          <button id="ingestBtn" class="primary-action" type="button">Subir e ingestar</button>
          <div id="documentsList" class="documents-list"></div>
        </div>
      </article>

      <article class="panel query-panel">
        <div class="panel-head"><div><p>CONSULTA</p><h2>Inferencia</h2></div><span id="queryState">READY</span></div>
        <div class="panel-body">
          <textarea id="questionInput" class="question-input" rows="7" placeholder="Pregunta sobre el programa, reglamento, requisitos, casos o salidas esperadas."></textarea>
          <div class="query-controls">
            <label><small>Top K</small><input id="topK" type="number" min="1" max="12" value="6"></label>
            <button id="queryBtn" class="primary-action" type="button">Consultar ESCOLA</button>
          </div>
          <div id="answerCards" class="answer-cards"></div>
        </div>
      </article>

      <article class="panel copy-panel">
        <div class="panel-head"><div><p>SALIDA</p><h2>Copiar y pegar</h2></div><button id="copyBtn" class="small-action" type="button">Copiar</button></div>
        <pre id="copyBox" class="copy-box">Sin consulta.</pre>
      </article>

      <article class="panel evidence-panel">
        <div class="panel-head"><div><p>EVIDENCIA</p><h2>Fragmentos</h2></div><span id="evidenceState">--</span></div>
        <div id="evidenceList" class="evidence-list"></div>
      </article>
    </section>
  </main>
</div>
<script src="../js/platform-menu.js?v=20260609-escola"></script>
<script src="../js/session.js?v=20260517-user"></script>
<script src="./js/escola.js?v=20260609-1"></script>
</body>
</html>
