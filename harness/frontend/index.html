<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>QuantLab AI Capital Harness</title>
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body>
    <header>
      <h1>QuantLab AI Capital</h1>
      <span>Agent Runtime</span>
    </header>
    <main>
      <section class="panel chat">
        <div class="chat-head">
          <h2>Chat Agent</h2>
          <div id="requestStatus" class="status idle">Listo para enviar prompt.</div>
        </div>
        <div id="messages" aria-live="polite"></div>
        <form id="chatForm">
          <select id="agent"></select>
          <input id="prompt" placeholder="Ask the harness..." autocomplete="off">
          <button>Run</button>
        </form>
      </section>
      <section class="grid">
        <article><h3>Agents</h3><ul id="agents"></ul></article>
        <article><h3>Tools</h3><ul id="tools"></ul></article>
        <article><h3>System</h3><pre id="system"></pre></article>
        <article><h3>Tasks</h3><ul id="tasks"></ul></article>
        <article><h3>Memory</h3><pre id="memory"></pre></article>
        <article><h3>Artifacts</h3><ul id="artifacts"></ul></article>
      </section>
    </main>
    <script src="/static/js/app.js"></script>
  </body>
</html>
