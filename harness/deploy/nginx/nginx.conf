events {}
http {
  upstream flask_upstream { server flask:5000; }
  upstream websocket_upstream { server websocket:8765; }
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  server {
    listen 80;
    server_name quantlabs.site;
    location / { proxy_pass http://flask_upstream; proxy_set_header Host $host; }
    location /v1/ { limit_req zone=api burst=20 nodelay; proxy_pass http://flask_upstream; }
    location /ws { proxy_pass http://websocket_upstream; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
  }
}
