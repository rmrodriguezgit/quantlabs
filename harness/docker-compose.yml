services:
  harness:
    build: .
    env_file: .env
    volumes: ["./storage:/app/storage","./notebooks:/app/notebooks"]
    depends_on: [postgres, redis, llama-cpp]
    deploy:
      resources:
        reservations:
          devices: [{capabilities: [gpu]}]
  flask:
    build: .
    env_file: .env
    command: gunicorn -k gevent -w 2 -b 0.0.0.0:5000 api.app:app
    depends_on: [postgres, redis]
  websocket:
    build: .
    env_file: .env
    command: python3 websocket/server.py
  postgres:
    image: postgres:17
    environment: {POSTGRES_DB: quantlab, POSTGRES_USER: quantlab, POSTGRES_PASSWORD: quantlab}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    command: ["-m","/models/Nous-Hermes-2-Mistral-7B-DPO.Q4_K_M.gguf","--host","0.0.0.0","--port","8080","-ngl","99"]
    volumes: ["./models:/models"]
    deploy:
      resources:
        reservations:
          devices: [{capabilities: [gpu]}]
  jupyter:
    build: .
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    volumes: ["./notebooks:/app/notebooks"]
  nginx:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    volumes: ["./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [flask, websocket]
volumes:
  postgres_data:
